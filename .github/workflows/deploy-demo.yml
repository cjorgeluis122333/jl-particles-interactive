name: Deploy Demo + Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'documentation/**'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json
            documentation/package-lock.json

      - name: Install library deps
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install demo deps
        working-directory: demo
        run: npm ci

      - name: Build demo
        working-directory: demo
        run: npm run build

      - name: Install docs deps
        working-directory: documentation
        run: npm ci

      - name: Build docs
        working-directory: documentation
        run: npm run build

      - name: Merge build outputs
        run: |
          mkdir -p combined
          cp -r demo/dist/. combined/
          mkdir -p combined/docs
          cp -r documentation/dist/. combined/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
